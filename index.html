<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titanium OS - E-Bike</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-dark: #05050a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #6c757d;
            --color-safe: #00f2fe;     /* Neon Blue */
            --color-warn: #f5af19;     /* Neon Orange */
            --color-danger: #ff0844;   /* Neon Red */
            --color-eco: #38ef7d;      /* Neon Green */
        }

        body {
            background: radial-gradient(circle at 50% -20%, #1a1a2e, var(--bg-dark) 80%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin: 20px 0 30px 0;
            width: 100%;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status {
            font-family: 'Roboto Mono', monospace;
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-dim);
            margin-right: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0);
            transition: all 0.3s ease;
        }

        .connected .pulse-dot {
            background-color: var(--color-eco);
            box-shadow: 0 0 12px var(--color-eco);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .card-title {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        /* SVG Circular Gauge Styles */
        .gauge-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }

        .gauge-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--color-safe);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 251.2; /* 2 * pi * r (r=40) */
            stroke-dashoffset: 251.2; /* Starts empty */
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
        }

        .gauge-data {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .value {
            font-family: 'Roboto Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            transition: color 0.5s ease;
        }

        .unit {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: -4px;
        }

        #connectBtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 18px 40px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        #connectBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--color-safe);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        #connectBtn:active { transform: scale(0.97); }

        /* Dynamic Glow Classes */
        .glow-safe { filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); }
        .glow-warn { filter: drop-shadow(0 0 12px rgba(245, 175, 25, 0.8)); }
        .glow-danger { filter: drop-shadow(0 0 15px rgba(255, 8, 68, 1)); }

    </style>
</head>
<body>

    <header>
        <h1>TITANIUM</h1>
        <div id="statusText" class="status"><span class="pulse-dot"></span>System Offline</div>
    </header>

    <div class="grid">
        <div class="card">
            <div class="card-title">Smoke</div>
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 100">
                    <circle class="gauge-bg" cx="50" cy="50" r="40"></circle>
                    <circle id="smokeRing" class="gauge-fill glow-safe" cx="50" cy="50" r="40"></circle>
                </svg>
                <div class="gauge-data">
                    <div id="smokeValue" class="value">0</div>
                    <div class="unit">PPM</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Exhaust</div>
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 100">
                    <circle class="gauge-bg" cx="50" cy="50" r="40"></circle>
                    <circle id="gasRing" class="gauge-fill glow-safe" cx="50" cy="50" r="40"></circle>
                </svg>
                <div class="gauge-data">
                    <div id="gasValue" class="value">0</div>
                    <div class="unit">PPM</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Core Temp</div>
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 100">
                    <circle class="gauge-bg" cx="50" cy="50" r="40"></circle>
                    <circle id="tempRing" class="gauge-fill" style="stroke: var(--color-warn);" cx="50" cy="50" r="40"></circle>
                </svg>
                <div class="gauge-data">
                    <div id="tempValue" class="value">0</div>
                    <div class="unit">°C</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Humidity</div>
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 100">
                    <circle class="gauge-bg" cx="50" cy="50" r="40"></circle>
                    <circle id="humRing" class="gauge-fill" style="stroke: var(--color-eco);" cx="50" cy="50" r="40"></circle>
                </svg>
                <div class="gauge-data">
                    <div id="humValue" class="value">0</div>
                    <div class="unit">%</div>
                </div>
            </div>
        </div>
    </div>

    <button id="connectBtn">Initialize Link</button>

    <script>
        const bleService = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const bleCharacteristic = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
        
        let bluetoothDevice;
        let bleBuffer = ""; 
        
        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const header = document.querySelector('header');
        
        // Data Elements
        const vals = {
            smoke: document.getElementById('smokeValue'),
            gas: document.getElementById('gasValue'),
            temp: document.getElementById('tempValue'),
            hum: document.getElementById('humValue')
        };

        // SVG Rings
        const rings = {
            smoke: document.getElementById('smokeRing'),
            gas: document.getElementById('gasRing'),
            temp: document.getElementById('tempRing'),
            hum: document.getElementById('humRing')
        };

        // Math for SVG Circles (Circumference = 2 * pi * r) r=40
        const CIRCUMFERENCE = 251.2;

        function updateGauge(ring, textElement, value, maxVal, isGas) {
            // Update Text
            textElement.innerText = value;

            // Calculate how much of the ring to fill
            let fillPercentage = Math.min(value / maxVal, 1);
            let offset = CIRCUMFERENCE - (fillPercentage * CIRCUMFERENCE);
            ring.style.strokeDashoffset = offset;

            // Dynamic Styling for Gases
            if (isGas) {
                ring.classList.remove('glow-safe', 'glow-warn', 'glow-danger');
                if (value < 50) {
                    ring.style.stroke = 'var(--color-safe)';
                    ring.classList.add('glow-safe');
                    textElement.style.color = '#fff';
                } else if (value < 200) {
                    ring.style.stroke = 'var(--color-warn)';
                    ring.classList.add('glow-warn');
                    textElement.style.color = 'var(--color-warn)';
                } else {
                    ring.style.stroke = 'var(--color-danger)';
                    ring.classList.add('glow-danger');
                    textElement.style.color = 'var(--color-danger)';
                }
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                if (!navigator.bluetooth) {
                    alert('Web Bluetooth requires Chrome on Android.');
                    return;
                }

                statusText.innerHTML = '<span class="pulse-dot"></span>Establishing Uplink...';
                
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'EBike_Master' }],
                    optionalServices: [bleService]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(bleService);
                const characteristic = await service.getCharacteristic(bleCharacteristic);

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleData);
                
                // UI changes on connect
                header.classList.add('connected');
                statusText.innerHTML = '<span class="pulse-dot"></span>Live Telemetry Active';
                connectBtn.style.display = 'none';

            } catch (error) {
                console.error(error);
                statusText.innerHTML = '<span class="pulse-dot"></span>Connection Failed';
            }
        });

        function handleData(event) {
            let chunk = new TextDecoder().decode(event.target.value);
            bleBuffer += chunk;
            
            if (bleBuffer.includes('\n')) {
                let lines = bleBuffer.split('\n');
                let completeData = lines[0]; 
                bleBuffer = lines[1] || ""; 
                
                let dataParts = completeData.trim().split(',');
                
                if(dataParts.length === 4) {
                    let smoke = parseInt(dataParts[0]);
                    let gas = parseInt(dataParts[1]);
                    let temp = parseInt(dataParts[2]);
                    let hum = parseInt(dataParts[3]);

                    // Max Values for the rings: Smoke/Gas (1000 PPM), Temp (60C), Hum (100%)
                    updateGauge(rings.smoke, vals.smoke, smoke, 1000, true);
                    updateGauge(rings.gas, vals.gas, gas, 1000, true);
                    updateGauge(rings.temp, vals.temp, temp, 60, false);
                    updateGauge(rings.hum, vals.hum, hum, 100, false);
                }
            }
        }

        function onDisconnected() {
            header.classList.remove('connected');
            statusText.innerHTML = '<span class="pulse-dot"></span>Connection Lost';
            connectBtn.style.display = 'block';
            connectBtn.innerText = "Reconnect System";
            bleBuffer = ""; 
            
            // Reset rings
            updateGauge(rings.smoke, vals.smoke, 0, 1000, true);
            updateGauge(rings.gas, vals.gas, 0, 1000, true);
            updateGauge(rings.temp, vals.temp, 0, 60, false);
            updateGauge(rings.hum, vals.hum, 0, 100, false);
        }
    </script>
</body>
</html>
